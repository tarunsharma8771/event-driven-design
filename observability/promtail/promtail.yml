server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: service-file-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: service-logs
          service: order-service
          __path__: /var/log/event-driven-design/order-service/*.log
      - targets:
          - localhost
        labels:
          job: service-logs
          service: payment-service
          __path__: /var/log/event-driven-design/payment-service/*.log
      - targets:
          - localhost
        labels:
          job: service-logs
          service: notification-service
          __path__: /var/log/event-driven-design/notification-service/*.log
      - targets:
          - localhost
        labels:
          job: service-logs
          service: inventory-service
          __path__: /var/log/event-driven-design/inventory-service/*.log
